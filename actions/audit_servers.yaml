---
name: audit_servers
description: >
  List every secret in a Secret Server folder, SSH into each server using the
  credentials stored in the secret (machine / username / password fields), and
  return the live hostname and IP address.
  Authentication to Secret Server uses a username and password stored in ST2 KV
  to obtain an OAuth2 Bearer token via password grant.
runner_type: python-script
entry_point: audit_servers.py
enabled: true
parameters:
  folder_name:
    type: string
    description: Exact name of the Secret Server folder to enumerate.
    required: true
  ss_kv_username:
    type: string
    description: ST2 KV key holding the Secret Server username (plain text).
    required: false
    default: ss_username
  ss_kv_password:
    type: string
    description: ST2 KV key holding the Secret Server password (stored encrypted).
    required: false
    default: ss_password
  ss_kv_url_key:
    type: string
    description: ST2 KV key holding the Secret Server base URL (plain text).
    required: false
    default: ss_url
  ssh_port:
    type: integer
    description: SSH port to connect on.
    required: false
    default: 22
  ssh_timeout:
    type: integer
    description: SSH connection timeout in seconds.
    required: false
    default: 10
